<!DOCTYPE html>

<html>

<head>
	<link rel="stylesheet" href="styles.css">
</head>

<body>
	<!-- the entire body must be written by student -->
	<form method="post">
		<label for="name">name</label>
		<input type="text" required id="name" placeholder="Name"><br>	
		<label for="email">email</label>
		<input type="email" required id="email" placeholder="Email"><br>
		<label for="gender_m">male</label>
		<input type="radio" required id="gender_m" name="gender" >
		<label for="gender_f">female</label>
		<input type="radio" required id="gender_f" name="gender">
		<label for="cars" >cars</label>
		<select id="cars" required type="select" placeholder="--Please choose an option--" >
			<optgroup>
				<option>maruti suzuki</option>
				<option>Tata</option>
			</optgroup>
		</select><br>
		<label for="age">age</label>
		<input type="number" required id="age" placeholder="Age"><br>
		<label for="dob">dob</label>
		<input type="date" required id="dob" ><br>
		<label for="tel">tel</label>		
		<input type="tel" id="tel" placeholder="xxx-xxx-xxxx" ><br>
		<label for="password">password</label>		
		<input type="password" required id="password" placeholder="password" ><br>
		<label for="tos">I agree to the TOS</label>		
		<input type="checkbox" required id="tos"><br>
		<button type="submit">submit</button>
	</form>
		
    <script type="text/javascript" src="./script.js">
</script>

</body>

</html>
